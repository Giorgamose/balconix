<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
  </defs>
  
  <!-- Window Icon -->
  <g transform="translate(5, 5)">
    <!-- Window Frame -->
    <rect x="0" y="0" width="40" height="40" rx="4" fill="url(#blueGradient)"/>
    <!-- Window Panes -->
    <rect x="4" y="4" width="14" height="14" rx="2" fill="#FFFFFF"/>
    <rect x="22" y="4" width="14" height="14" rx="2" fill="#FFFFFF"/>
    <rect x="4" y="22" width="14" height="14" rx="2" fill="#FFFFFF"/>
    <rect x="22" y="22" width="14" height="14" rx="2" fill="#FFFFFF"/>
    <!-- Window Dividers -->
    <line x1="20" y1="4" x2="20" y2="36" stroke="url(#blueGradient)" stroke-width="2"/>
    <line x1="4" y1="20" x2="36" y2="20" stroke="url(#blueGradient)" stroke-width="2"/>
  </g>
  
  <!-- Text: Balconix -->
  <text x="55" y="32" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#1F2937">
    Balcon<tspan fill="#2563EB">ix</tspan>
  </text>
</svg>
